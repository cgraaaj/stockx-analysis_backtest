# On every push to master, append a new release entry to RELEASE_NOTES.md
# and commit it back. Skips when the triggering commit message contains [skip ci]
# so the workflow's own commit does not trigger another run.

name: Update release notes

on:
  push:
    branches: [master]

jobs:
  update:
    # Do not run when the push was our own "Update release notes" commit
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 50

      - name: Update RELEASE_NOTES.md
        run: |
          chmod +x scripts/update-release-notes.sh
          ./scripts/update-release-notes.sh

      - name: Commit and push if changed
        run: |
          if git diff --quiet RELEASE_NOTES.md; then
            echo "No changes to RELEASE_NOTES.md"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RELEASE_NOTES.md
          git commit -m "Update release notes [skip ci]"
          git push
